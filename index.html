<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révisions Brevet 3ᵉ — Cahier de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <button class="brand" onclick="go({view:'home'})">Brevet <em>2026</em></button>
    <div class="header-actions">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <input class="search" type="text" placeholder="Rechercher une leçon…" id="searchInput" oninput="onSearch(event)" onfocus="onSearch(event)">
      </div>
      <button class="icon-btn" onclick="go({view:'dashboard'})" title="Tableau de bord">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span class="hide-mobile">Tableau</span>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="Mode sombre" id="themeBtn">
        <span id="themeIcon">☾</span>
      </button>
    </div>
  </div>
</header>

<main class="main" id="app"></main>

<script>
/* ============================================
   DATA — toutes les matières, leçons et quiz
   sera injecté juste après ce squelette
   ============================================ */
const DATA = {};

/* ============================================
   STATE & STORAGE
   ============================================ */
const STORAGE_KEY = 'brevet-revisions-v1';
let state = {
  view: 'home',
  subject: null,
  lesson: null,
  quizState: null,
  searchQuery: '',
};

let progress = loadProgress();

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn('Storage read failed', e); }
  return {
    revised: {}, // {subjectId: {lessonId: true}}
    quizScores: {}, // {subjectId: {lessonId: [{score, total, date}]}}
    points: 0,
    theme: 'light',
  };
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch (e) { console.warn('Storage write failed', e); }
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeIcon').textContent = next === 'light' ? '☾' : '☀';
  progress.theme = next;
  saveProgress();
}

// init theme
if (progress.theme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  setTimeout(() => { document.getElementById('themeIcon').textContent = '☀'; }, 0);
}

/* ============================================
   ROUTER
   ============================================ */
function go(newState) {
  state = { ...state, ...newState };
  if (newState.view) state.searchQuery = '';
  window.scrollTo({ top: 0, behavior: 'instant' });
  render();
}

/* ============================================
   PROGRESS HELPERS
   ============================================ */
function isRevised(subjectId, lessonId) {
  return !!(progress.revised[subjectId] && progress.revised[subjectId][lessonId]);
}
function toggleRevised(subjectId, lessonId) {
  if (!progress.revised[subjectId]) progress.revised[subjectId] = {};
  if (progress.revised[subjectId][lessonId]) {
    delete progress.revised[subjectId][lessonId];
  } else {
    progress.revised[subjectId][lessonId] = true;
    progress.points += 10;
  }
  saveProgress();
}
function recordQuizScore(subjectId, lessonId, score, total) {
  if (!progress.quizScores[subjectId]) progress.quizScores[subjectId] = {};
  if (!progress.quizScores[subjectId][lessonId]) progress.quizScores[subjectId][lessonId] = [];
  progress.quizScores[subjectId][lessonId].push({ score, total, date: Date.now() });
  progress.points += score * 5;
  saveProgress();
}
function bestQuizScore(subjectId, lessonId) {
  const scores = progress.quizScores[subjectId]?.[lessonId];
  if (!scores || !scores.length) return null;
  return scores.reduce((max, s) => (s.score / s.total) > (max.score / max.total) ? s : max);
}
function subjectProgress(subjectId) {
  const subj = DATA[subjectId];
  if (!subj) return 0;
  const total = subj.lessons.length;
  if (!total) return 0;
  const done = Object.keys(progress.revised[subjectId] || {}).length;
  return Math.round((done / total) * 100);
}
function globalProgress() {
  let total = 0, done = 0;
  Object.keys(DATA).forEach(sid => {
    total += DATA[sid].lessons.length;
    done += Object.keys(progress.revised[sid] || {}).length;
  });
  return total ? Math.round((done / total) * 100) : 0;
}

/* ============================================
   UTILS
   ============================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function readingTime(content) {
  const text = content.replace(/<[^>]+>/g, ' ');
  const words = text.trim().split(/\s+/).length;
  return Math.max(3, Math.ceil(words / 200));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function ytSearchUrl(query) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query + ' brevet 3e');
}

function youtubeLinks(queries) {
  return queries.map(q => `
    <a class="video-link" href="${ytSearchUrl(q)}" target="_blank" rel="noopener">
      <span class="play">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </span>
      <span class="title">${escapeHtml(q)}</span>
      <span class="arrow">↗</span>
    </a>
  `).join('');
}

function setSubjectVars(subjectId) {
  const colors = {
    maths: { c: 'var(--maths)', s: 'var(--maths-soft)' },
    francais: { c: 'var(--fr)', s: 'var(--fr-soft)' },
    histoiregeo: { c: 'var(--hg)', s: 'var(--hg-soft)' },
    emc: { c: 'var(--emc)', s: 'var(--emc-soft)' },
    sciences: { c: 'var(--svt)', s: 'var(--svt-soft)' },
    physiquechimie: { c: 'var(--pc)', s: 'var(--pc-soft)' },
    svt: { c: 'var(--svt)', s: 'var(--svt-soft)' },
    technologie: { c: 'var(--tech)', s: 'var(--tech-soft)' },
  };
  const cs = colors[subjectId] || { c: 'var(--ink)', s: 'var(--paper-deep)' };
  return `--subject-color: ${cs.c}; --subject-soft: ${cs.s};`;
}

function encouragement(pct) {
  if (pct === 100) return "Sans-faute. Tu maîtrises le sujet — passe à la suite.";
  if (pct >= 80) return "Très solide. Encore un tour pour aller chercher le 20/20.";
  if (pct >= 60) return "Bien parti. Reprends les questions ratées et retente.";
  if (pct >= 40) return "Tu accroches. La fiche de révision va consolider tout ça.";
  if (pct >= 20) return "Il faut relire la leçon — l'essentiel n'est pas encore en place.";
  return "Ce chapitre n'est pas acquis. Relis la fiche tranquillement, puis reviens.";
}

/* ============================================
   RENDER
   ============================================ */
function render() {
  const app = document.getElementById('app');
  if (state.searchQuery && state.searchQuery.length >= 2) {
    app.innerHTML = renderSearch();
  } else if (state.view === 'home') {
    app.innerHTML = renderHome();
  } else if (state.view === 'subject') {
    app.innerHTML = renderSubject(state.subject);
  } else if (state.view === 'lesson') {
    app.innerHTML = renderLesson(state.subject, state.lesson);
  } else if (state.view === 'quiz') {
    app.innerHTML = renderQuiz();
  } else if (state.view === 'quiz-result') {
    app.innerHTML = renderQuizResult();
  } else if (state.view === 'dashboard') {
    app.innerHTML = renderDashboard();
  }
}

/* ----- HOME ----- */
function renderHome() {
  const pct = globalProgress();
  const subjects = Object.keys(DATA);
  return `
    <section class="hero">
      <div class="hero-eyebrow">Cahier de bord · 3<sup>e</sup></div>
      <h1 class="hero-title">
        Tu es à <em>${pct}<span class="pct">%</span></em> du programme.
      </h1>
      <p class="hero-sub">Toutes les notions du Brevet, à ton rythme. Lis, fais le quiz, recommence si besoin. La progression est enregistrée dans ton navigateur — aucun compte, rien à installer.</p>
    </section>

    <section class="section" style="margin-top:0;">
      <div class="section-head">
        <h2 class="section-title">Les matières</h2>
        <span class="section-meta">5 matières · ${Object.values(DATA).reduce((n,s)=>n+s.lessons.length,0)} leçons</span>
      </div>
      <div class="subjects">
        ${subjects.map(sid => {
          const s = DATA[sid];
          const p = subjectProgress(sid);
          return `
            <button class="subject-card" style="${setSubjectVars(sid)}" onclick="go({view:'subject', subject:'${sid}'})">
              <span class="tab">${s.code}</span>
              <h3>${s.name}</h3>
              <div class="lessons-count">${s.lessons.length} chapitres</div>
              <div class="subject-progress">
                <div class="progress-label">
                  <span>Progression</span>
                  <span class="val">${p}%</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div>
              </div>
            </button>
          `;
        }).join('')}
      </div>
    </section>

    ${pct > 0 ? `<div class="banner">${encouragement(pct).replace(/^./, c=>c.toUpperCase())}</div>` : ''}
  `;
}

/* ----- SUBJECT ----- */
function renderSubject(sid) {
  const s = DATA[sid];
  if (!s) return renderHome();
  const p = subjectProgress(sid);
  const done = Object.keys(progress.revised[sid] || {}).length;

  return `
    <div style="${setSubjectVars(sid)}">
      <button class="crumb" onclick="go({view:'home'})">← Toutes les matières</button>

      <header class="subject-header">
        <div class="subject-eyebrow">${s.code}</div>
        <h1 class="subject-h1">${s.headline}</h1>
        <p style="font-size:18px; color:var(--ink-soft); max-width:680px; margin-bottom:24px;">${s.intro}</p>
        <div class="subject-meta">
          <div><strong>${s.lessons.length}</strong> chapitres</div>
          <div><strong>${done}</strong> révisés</div>
          <div><strong>${p}%</strong> de progression</div>
        </div>
        <div class="subject-actions">
          <button class="btn btn-primary" onclick="startMixedQuiz('${sid}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Quiz général de la matière
          </button>
        </div>
      </header>

      <div class="lessons-list">
        ${s.lessons.map((l, i) => {
          const revised = isRevised(sid, l.id);
          const best = bestQuizScore(sid, l.id);
          return `
            <button class="lesson-row" onclick="go({view:'lesson', subject:'${sid}', lesson:'${l.id}'})">
              <div class="lesson-num">${String(i+1).padStart(2, '0')}</div>
              <div class="lesson-info">
                <h4>${l.title}</h4>
                <div class="meta">
                  <span>${readingTime(l.content)} min de lecture</span>
                  ${best ? `<span class="dot"></span><span>meilleur score : ${best.score}/${best.total}</span>` : ''}
                </div>
              </div>
              <div class="lesson-status">
                <span class="status-pill ${revised ? 'done' : 'todo'}">${revised ? '✓ Révisée' : 'À voir'}</span>
              </div>
            </button>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

/* ----- LESSON ----- */
function renderLesson(sid, lid) {
  const s = DATA[sid];
  if (!s) return renderHome();
  const l = s.lessons.find(x => x.id === lid);
  if (!l) return renderSubject(sid);

  const revised = isRevised(sid, lid);
  const time = readingTime(l.content);

  return `
    <div style="${setSubjectVars(sid)}">
      <button class="crumb" onclick="go({view:'subject', subject:'${sid}'})">← ${s.name}</button>

      <article class="lesson-article">
        <div class="lesson-eyebrow">${s.name} · Chapitre ${s.lessons.indexOf(l)+1}</div>
        <h1 class="lesson-title">${l.title}</h1>
        <div class="lesson-meta">
          <span>${time} min de lecture</span>
          ${revised ? '<span>· révisée</span>' : ''}
        </div>

        <div class="lesson-content">${l.content}</div>

        ${l.review ? `
          <div class="review-card">
            <h3>${l.review.title || 'À retenir'}</h3>
            <ul>${l.review.points.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
        ` : ''}

        ${l.videos && l.videos.length ? `
          <section class="videos-section">
            <h3>Vidéos recommandées</h3>
            ${youtubeLinks(l.videos)}
          </section>
        ` : ''}

        <footer class="lesson-footer">
          <button class="btn ${revised ? 'btn-done' : 'btn-ghost'}" onclick="toggleRevised('${sid}','${lid}'); render();">
            ${revised ? '✓ Révisée' : 'Marquer comme révisée'}
          </button>
          <button class="btn btn-primary" onclick="startLessonQuiz('${sid}','${lid}')">
            Lancer le quiz →
          </button>
        </footer>
      </article>
    </div>
  `;
}

/* ============================================
   QUIZ ENGINE
   ============================================ */
function buildQuizSet(questions, n) {
  // mélanger questions, en prendre n, mélanger options des QCM
  const pick = shuffle(questions).slice(0, Math.min(n, questions.length));
  return pick.map(q => {
    if (q.type === 'qcm') {
      const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
      const shuffled = shuffle(opts);
      return { ...q, _options: shuffled };
    }
    return { ...q };
  });
}

function startLessonQuiz(sid, lid) {
  const s = DATA[sid];
  const l = s.lessons.find(x => x.id === lid);
  if (!l || !l.quiz || !l.quiz.length) {
    alert('Quiz indisponible pour cette leçon.');
    return;
  }
  state.quizState = {
    sid, lid,
    questions: buildQuizSet(l.quiz, Math.min(8, l.quiz.length)),
    current: 0,
    answers: [],
    selected: null,
    revealed: false,
    title: l.title,
  };
  go({ view: 'quiz' });
}

function startMixedQuiz(sid) {
  const s = DATA[sid];
  // collecter toutes les questions de la matière
  const all = [];
  s.lessons.forEach(l => {
    if (l.quiz) {
      l.quiz.forEach(q => all.push({ ...q, _from: l.title }));
    }
  });
  if (!all.length) { alert('Pas de questions disponibles.'); return; }
  state.quizState = {
    sid, lid: null,
    questions: buildQuizSet(all, 10),
    current: 0,
    answers: [],
    selected: null,
    revealed: false,
    title: `Quiz général ${s.name}`,
  };
  go({ view: 'quiz' });
}

function selectOption(idx) {
  if (!state.quizState || state.quizState.revealed) return;
  state.quizState.selected = idx;
  render();
}

function updateShortAnswer(val) {
  state.quizState.selected = val;
}

function submitAnswer() {
  const q = state.quizState.questions[state.quizState.current];
  let isCorrect = false;
  let given = state.quizState.selected;

  if (q.type === 'qcm') {
    if (given === null || given === undefined) return;
    isCorrect = q._options[given].isCorrect;
  } else if (q.type === 'tf') {
    if (given === null) return;
    isCorrect = (given === q.correct);
  } else if (q.type === 'short') {
    given = (given || '').toString().trim().toLowerCase();
    if (!given) return;
    const accepted = q.accepted.map(a => a.toLowerCase());
    isCorrect = accepted.some(a => given === a || given.replace(/\s+/g,'') === a.replace(/\s+/g,''));
  }

  state.quizState.answers.push({ question: q, given, isCorrect });
  state.quizState.revealed = true;
  render();
}

function nextQuestion() {
  state.quizState.current++;
  state.quizState.selected = null;
  state.quizState.revealed = false;
  if (state.quizState.current >= state.quizState.questions.length) {
    finishQuiz();
  } else {
    render();
  }
}

function finishQuiz() {
  const qs = state.quizState;
  const score = qs.answers.filter(a => a.isCorrect).length;
  const total = qs.questions.length;
  if (qs.lid) recordQuizScore(qs.sid, qs.lid, score, total);
  else {
    // mixed: enregistrer comme général
    if (!progress.quizScores[qs.sid]) progress.quizScores[qs.sid] = {};
    if (!progress.quizScores[qs.sid]['_general']) progress.quizScores[qs.sid]['_general'] = [];
    progress.quizScores[qs.sid]['_general'].push({ score, total, date: Date.now() });
    progress.points += score * 5;
    saveProgress();
  }
  go({ view: 'quiz-result' });
}

function renderQuiz() {
  const qs = state.quizState;
  if (!qs) return renderHome();
  const sid = qs.sid;
  const q = qs.questions[qs.current];
  const pct = ((qs.current) / qs.questions.length) * 100;

  let optionsHtml = '';
  if (q.type === 'qcm') {
    const letters = ['A', 'B', 'C', 'D', 'E'];
    optionsHtml = `
      <div class="quiz-options">
        ${q._options.map((opt, i) => {
          let cls = 'quiz-option';
          if (qs.revealed) {
            if (opt.isCorrect) cls += ' correct';
            else if (qs.selected === i) cls += ' incorrect';
            cls += ' disabled';
          } else if (qs.selected === i) {
            cls += ' selected';
          }
          return `
            <button class="${cls}" onclick="selectOption(${i})">
              <span class="letter">${letters[i]}</span>
              <span>${opt.text}</span>
            </button>
          `;
        }).join('')}
      </div>
    `;
  } else if (q.type === 'tf') {
    optionsHtml = `
      <div class="quiz-options">
        ${[true, false].map(val => {
          const label = val ? 'Vrai' : 'Faux';
          let cls = 'quiz-option';
          if (qs.revealed) {
            if (val === q.correct) cls += ' correct';
            else if (qs.selected === val) cls += ' incorrect';
            cls += ' disabled';
          } else if (qs.selected === val) {
            cls += ' selected';
          }
          return `
            <button class="${cls}" onclick="selectOption(${val})">
              <span class="letter">${val ? 'V' : 'F'}</span>
              <span>${label}</span>
            </button>
          `;
        }).join('')}
      </div>
    `;
  } else if (q.type === 'short') {
    optionsHtml = `
      <input type="text" class="quiz-input" placeholder="Ta réponse…" 
             value="${qs.revealed ? escapeHtml(qs.selected || '') : ''}"
             ${qs.revealed ? 'disabled' : ''}
             oninput="updateShortAnswer(this.value)" 
             onkeypress="if(event.key==='Enter'){submitAnswer()}">
      ${qs.revealed ? `
        <div style="font-size:14px; margin-bottom:16px;">
          ${qs.answers[qs.answers.length-1].isCorrect 
            ? '<span style="color:var(--ok); font-weight:600;">✓ Bonne réponse</span>' 
            : `<span style="color:var(--bad); font-weight:600;">✗ Mauvaise réponse.</span> Réponse attendue : <strong>${escapeHtml(q.accepted[0])}</strong>`}
        </div>
      ` : ''}
    `;
  }

  const typeLabel = { qcm: 'QCM', tf: 'Vrai / Faux', short: 'Réponse courte' }[q.type];

  return `
    <div class="quiz-shell" style="${setSubjectVars(sid)}">
      <button class="crumb" onclick="if(confirm('Quitter le quiz ?')) go({view: '${qs.lid ? 'lesson' : 'subject'}', subject: '${sid}'${qs.lid ? `, lesson: '${qs.lid}'` : ''}})">← Quitter</button>

      <header class="quiz-header">
        <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <div class="quiz-counter">
          <span>${qs.title}</span>
          <span>Question <strong>${qs.current + 1}</strong> / ${qs.questions.length}</span>
        </div>
      </header>

      <div class="quiz-type-badge">${typeLabel}</div>
      <h2 class="quiz-question">${q.question}</h2>

      ${optionsHtml}

      ${qs.revealed && q.explain ? `
        <div class="quiz-explanation">
          <strong>Explication.</strong> ${q.explain}
        </div>
      ` : ''}

      <div class="quiz-actions">
        ${qs.revealed
          ? `<button class="btn btn-primary" onclick="nextQuestion()">${qs.current + 1 >= qs.questions.length ? 'Voir le résultat' : 'Question suivante'} →</button>`
          : `<button class="btn btn-primary" onclick="submitAnswer()">Valider</button>`
        }
      </div>
    </div>
  `;
}

function renderQuizResult() {
  const qs = state.quizState;
  if (!qs) return renderHome();
  const sid = qs.sid;
  const score = qs.answers.filter(a => a.isCorrect).length;
  const total = qs.questions.length;
  const pct = Math.round((score / total) * 100);

  return `
    <div class="quiz-shell" style="${setSubjectVars(sid)}">
      <div class="result">
        <div class="result-score">${score}<em>/</em>${total}</div>
        <div class="result-pct">${pct}% de réussite</div>
        <p class="result-message">${encouragement(pct)}</p>
        <div class="result-breakdown">
          <div class="result-stat good">
            <span class="n">${score}</span>
            <span class="l">Bonnes réponses</span>
          </div>
          <div class="result-stat bad">
            <span class="n">${total - score}</span>
            <span class="l">Erreurs</span>
          </div>
          <div class="result-stat">
            <span class="n">+${score * 5}</span>
            <span class="l">Points gagnés</span>
          </div>
        </div>
        <div class="result-actions">
          ${qs.lid
            ? `<button class="btn btn-primary" onclick="startLessonQuiz('${qs.sid}','${qs.lid}')">Refaire un quiz</button>
               <button class="btn btn-ghost" onclick="go({view:'lesson', subject:'${qs.sid}', lesson:'${qs.lid}'})">Revoir la leçon</button>`
            : `<button class="btn btn-primary" onclick="startMixedQuiz('${qs.sid}')">Refaire un quiz</button>
               <button class="btn btn-ghost" onclick="go({view:'subject', subject:'${qs.sid}'})">Retour aux chapitres</button>`
          }
        </div>
      </div>

      <div class="result-review">
        <h3>Correction détaillée</h3>
        ${qs.answers.map((a, i) => {
          const q = a.question;
          let yourAns = '', correctAns = '';
          if (q.type === 'qcm') {
            const correctOpt = q._options.find(o => o.isCorrect);
            const givenOpt = q._options[a.given];
            yourAns = givenOpt ? givenOpt.text : '—';
            correctAns = correctOpt.text;
          } else if (q.type === 'tf') {
            yourAns = a.given ? 'Vrai' : 'Faux';
            correctAns = q.correct ? 'Vrai' : 'Faux';
          } else if (q.type === 'short') {
            yourAns = a.given || '—';
            correctAns = q.accepted[0];
          }
          return `
            <div class="review-item">
              <div class="q">${i+1}. ${q.question}</div>
              <div class="your-ans ${a.isCorrect ? 'right' : 'wrong'}">
                ${a.isCorrect ? '✓' : '✗'} Ta réponse : ${escapeHtml(yourAns)}
              </div>
              ${!a.isCorrect ? `<div class="correct-ans">✓ Bonne réponse : ${escapeHtml(correctAns)}</div>` : ''}
              ${q.explain ? `<div class="expl">${q.explain}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

      </div>
      <div class="dash-stat">
        <div class="label">Quiz réalisés</div>
        <div class="value">${totalQuizzes}</div>
      </div>
      <div class="dash-stat">
        <div class="label">Points</div>
        <div class="value">${progress.points}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2 class="section-title">Par matière</h2>
        <span class="section-meta">Détail des révisions</span>
      </div>
      ${Object.keys(DATA).map(sid => {
        const s = DATA[sid];
        const p = subjectProgress(sid);
        const done = Object.keys(progress.revised[sid] || {}).length;
        const colors = { maths:'var(--maths)', francais:'var(--fr)', histoiregeo:'var(--hg)', emc:'var(--emc)', physiquechimie:'var(--pc)', svt:'var(--svt)', technologie:'var(--tech)' };

      <button class="btn btn-ghost" onclick="if(confirm('Tout effacer ? Cette action est définitive.')){progress={revised:{},quizScores:{},points:0,theme:progress.theme};saveProgress();render();}">
        Réinitialiser la progression
      </button>
    </div>
  `;
}

/* ----- SEARCH ----- */
function onSearch(e) {
  const v = e.target.value;
  state.searchQuery = v;
  if (v && v.length >= 2) render();
  else if (!v) render();
}

function renderSearch() {
  const q = state.searchQuery.toLowerCase();
  const hits = [];
  Object.keys(DATA).forEach(sid => {
    DATA[sid].lessons.forEach(l => {
      if (l.title.toLowerCase().includes(q) || l.content.toLowerCase().includes(q)) {
        hits.push({ sid, l, subjectName: DATA[sid].name });
      }
    });
  });
  const colors = { maths:'var(--maths)', francais:'var(--fr)', histoiregeo:'var(--hg)', emc:'var(--emc)', physiquechimie:'var(--pc)', svt:'var(--svt)', technologie:'var(--tech)' };
  return `
    <div style="margin-bottom:24px; color:var(--ink-mute); font-size:14px;">${hits.length} résultat${hits.length>1?'s':''} pour « ${escapeHtml(state.searchQuery)} »</div>
    ${hits.length ? `
      <div class="search-results">
        ${hits.map(h => `
          <button class="search-result" onclick="document.getElementById('searchInput').value=''; state.searchQuery=''; go({view:'lesson', subject:'${h.sid}', lesson:'${h.l.id}'})">
            <span class="subj-tag" style="background:${colors[h.sid]};">${DATA[h.sid].code}</span>
            <span class="title">${h.l.title}</span>
          </button>
        `).join('')}
      </div>
    ` : '<div class="no-results">Aucune leçon ne correspond. Essaie un autre mot-clé.</div>'}
  `;
}

<p>Une <strong>fonction</strong> est une « machine » qui transforme un nombre en un autre. Au brevet, on travaille surtout avec des fonctions <strong>linéaires</strong> et <strong>affines</strong>, qui se représentent par des droites.</p>

<h2>Vocabulaire</h2>
<p>Si <code>f(x) = 3x + 2</code>, on lit « f de x égal 3x plus 2 ». On dit que f est une fonction de x. L'<strong>image</strong> de 4 par f est <code>f(4) = 3 × 4 + 2 = 14</code>. Un <strong>antécédent</strong> de 14 est 4 (c'est le nombre qui donne 14 en image).</p>

<h2>Fonction linéaire</h2>
<p>Une fonction linéaire est de la forme <code>f(x) = ax</code>. Sa représentation est une droite qui passe par <strong>l'origine</strong>.</p>
<ul>
  <li><strong>a</strong> est le <em>coefficient directeur</em> (ou pente).</li>
  <li>Une fonction linéaire modélise une <strong>situation de proportionnalité</strong>.</li>
</ul>

<div class="example">
<p>Si 1 kg de pommes coûte 2,50 €, alors le prix <code>f(x) = 2,50 × x</code> est une fonction linéaire. Le coefficient est le prix unitaire.</p>
</div>

<h2>Fonction affine</h2>
<p>Une fonction affine est de la forme <code>f(x) = ax + b</code>. Sa représentation est une droite qui <strong>ne passe pas forcément par l'origine</strong>.</p>
<ul>
  <li><strong>a</strong> : coefficient directeur (la pente).</li>
  <li><strong>b</strong> : ordonnée à l'origine (l'image de 0, donc le point où la droite coupe l'axe vertical).</li>
</ul>

<div class="example">
<p>Un taxi facture 4 € de prise en charge plus 1,20 € par kilomètre. Le prix d'une course est <code>f(x) = 1,20x + 4</code>. Ce n'est pas une situation de proportionnalité (à cause du 4 € fixe).</p>
</div>

<h2>Calculer une image, un antécédent</h2>
<div class="example">
<p>Soit <code>f(x) = 2x − 5</code>.</p>

<p>L'arithmétique étudie les <strong>nombres entiers</strong> et leurs propriétés. Au brevet : <strong>diviseurs, multiples, nombres premiers, PGCD</strong> et <strong>fractions irréductibles</strong>.</p>

<h2>Diviseurs et multiples</h2>
<p>Un entier <strong>a divise</strong> un entier b si b est un multiple de a, c'est-à-dire si la division b ÷ a tombe juste (reste nul).</p>

<div class="example">
<p>12 est divisible par 1, 2, 3, 4, 6 et 12. Ce sont les diviseurs de 12.</p>
<p>Les multiples de 5 sont : 0, 5, 10, 15, 20, 25…</p>

<h3>Critères de divisibilité</h3>
<ul>
  <li>Divisible par <strong>2</strong> : se termine par 0, 2, 4, 6 ou 8.</li>
  <li>Divisible par <strong>3</strong> : la somme des chiffres est un multiple de 3.</li>
  <li>Divisible par <strong>5</strong> : se termine par 0 ou 5.</li>
  <li>Divisible par <strong>9</strong> : la somme des chiffres est un multiple de 9.</li>
  <li>Divisible par <strong>10</strong> : se termine par 0.</li>
</ul>

<h2>Nombres premiers</h2>
<p>Un nombre premier a <strong>exactement deux diviseurs</strong> : 1 et lui-même. Les premiers nombres premiers : 2, 3, 5, 7, 11, 13, 17, 19, 23…</p>

<h2>PGCD</h2>
<p>Le <strong>PGCD</strong> (Plus Grand Commun Diviseur) de deux entiers est le plus grand entier qui les divise tous les deux.</p>

<h3>Algorithme d'Euclide</h3>
<p>On effectue des divisions euclidiennes successives. Le dernier reste non nul est le PGCD.</p>

<div class="example">

<p>84 = 60 × 1 + 24</p>
<p>60 = 24 × 2 + 12</p>
<p>24 = 12 × 2 + 0</p>
<p>Dernier reste non nul : 12. Donc <code>PGCD(60, 84) = 12</code>.</p>
</div>

<h2>Les classes grammaticales</h2>
<p>La classe d'un mot ne change jamais — elle est dans le dictionnaire. Les principales :</p>
<ul>
  <li><strong>Nom</strong> : table, joie, Paris.</li>
  <li><strong>Verbe</strong> : courir, être, voir.</li>
  <li><strong>Adjectif qualificatif</strong> : beau, ancien, vert.</li>
  <li><strong>Déterminant</strong> : le, ma, ces, plusieurs.</li>
  <li><strong>Pronom</strong> : je, lui, qui, celui.</li>
  <li><strong>Adverbe</strong> : vite, lentement, ici, hier.</li>
  <li><strong>Préposition</strong> : à, de, pour, sans.</li>
  <li><strong>Conjonction</strong> : mais, et, parce que, lorsque.</li>
</ul>

<h2>Les fonctions principales</h2>
<p>La fonction dépend de la <strong>phrase</strong> : le même mot peut avoir des fonctions différentes selon le contexte.</p>

<p>Une <strong>proposition</strong> est un morceau de phrase contenant un verbe conjugué. Une phrase complexe contient plusieurs propositions. Au brevet, il faut savoir <strong>identifier et nommer</strong> les propositions subordonnées.</p>

<h2>Principale et subordonnée</h2>
<p>Dans une phrase complexe, la <strong>proposition principale</strong> peut exister seule. La <strong>subordonnée</strong> dépend d'elle, et commence souvent par un mot subordonnant (que, qui, parce que…).</p>

<div class="example">
<p><em>Je pense / qu'il viendra.</em></p>
<p>« Je pense » est la principale (elle existe seule). « qu'il viendra » est la subordonnée (introduite par « que »).</p>
</div>

<h2>Les principales subordonnées</h2>

<h3>Relative</h3>
<p>Introduite par un <strong>pronom relatif</strong> (qui, que, dont, où, lequel…). Elle complète un nom (= elle est <strong>complément de l'antécédent</strong>).</p>
<div class="example">
<p><em>Le livre <strong>que tu m'as offert</strong> est passionnant.</em></p>
<p>« que tu m'as offert » est subordonnée relative, complète le nom « livre ».</p>
</div>

<h3>Conjonctive (complétive)</h3>
<p>Introduite par <strong>« que »</strong>. Elle complète un verbe (= elle est <strong>COD du verbe</strong>).</p>
<div class="example">
<p><em>Je pense <strong>que tu as raison</strong>.</em></p>
<p>« que tu as raison » est COD du verbe « pense ».</p>
</div>

<h3>Circonstancielle</h3>
<p>Introduite par une conjonction de subordination (quand, lorsque, parce que, si, bien que…). Elle exprime une circonstance.</p>
<ul>
  <li><strong>Temps</strong> : quand, lorsque, dès que…</li>
  <li><strong>Cause</strong> : parce que, puisque, comme…</li>
  <li><strong>Conséquence</strong> : si bien que, de sorte que…</li>
  <li><strong>But</strong> : pour que, afin que…</li>
  <li><strong>Condition</strong> : si, à condition que…</li>
  <li><strong>Opposition / concession</strong> : alors que, bien que…</li>
</ul>

<div class="example">
<p><em>Il sortira <strong>quand la pluie cessera</strong>.</em> → CC de temps.</p>
<p><em>Il est resté <strong>parce qu'il pleuvait</strong>.</em> → CC de cause.</p>
</div>

<div class="tip">Le mot « que » peut introduire plusieurs types de subordonnées. Il faut analyser : si « que » remplace un nom et a un antécédent, c'est une relative. Sinon, c'est une conjonctive ou une circonstancielle.</div>

<p>Les figures de style sont des <strong>procédés d'écriture</strong> qui rendent un texte plus expressif. Au brevet, il faut savoir les <strong>repérer</strong> et expliquer leur <strong>effet</strong>.</p>

<h2>Figures de comparaison</h2>

<h3>La comparaison</h3>
<p>Rapproche deux éléments à l'aide d'un <strong>outil de comparaison</strong> (comme, tel que, ressembler à…).</p>
<div class="example"><em>Ses yeux brillent comme des étoiles.</em></div>

<h3>La métaphore</h3>
<p>Même principe, mais <strong>sans outil de comparaison</strong>. Plus directe, plus poétique.</p>
<div class="example"><em>Ses yeux sont des étoiles.</em></div>

<h3>La personnification</h3>
<p>Attribuer à un objet, un animal ou une idée des <strong>caractéristiques humaines</strong>.</p>
<div class="example"><em>Le vent murmurait à mon oreille.</em></div>

<h2>Figures d'insistance</h2>

<h3>L'anaphore</h3>
<p>Reprise du <strong>même mot</strong> en début de phrase ou de vers.</p>
<div class="example"><em>Un soir, j'ai marché. Un soir, j'ai chanté. Un soir, j'ai pleuré.</em></div>

<h3>L'hyperbole</h3>
<p><strong>Exagération</strong> pour amplifier une idée.</p>
<div class="example"><em>Je meurs de faim ! J'ai vu cela mille fois !</em></div>

<h3>L'énumération</h3>
<p>Liste d'éléments pour donner une impression d'abondance.</p>
<div class="example"><em>Sur la table : pain, fromage, vin, fruits, gâteaux…</em></div>

<h2>Figures d'opposition</h2>

<h3>L'antithèse</h3>
<p>Mise en opposition de <strong>deux termes contraires</strong> dans la même phrase.</p>
<div class="example"><em>Le jour et la nuit. La joie naissait dans la douleur.</em></div>

<h3>L'oxymore</h3>
<p>Deux mots de sens opposés <strong>côte à côte</strong>.</p>

<h2>Figures de substitution</h2>

<h3>La métonymie</h3>
<p>Désigner une chose par <strong>une autre qui lui est associée</strong>.</p>

<ol>

  <li><strong>Brouillon</strong> : note les idées en vrac, puis organise-les.</li>

<ul>

  <li><strong>Élément perturbateur</strong> : ce qui déclenche l'histoire.</li>

  <li><strong>Situation finale</strong> : où on en est à la fin.</li>

<h3>Plan classique</h3>
<ol>

<ul>

<p>L'épreuve de compréhension du brevet propose un texte (souvent extrait d'un roman du XX<sup>e</sup> ou XXI<sup>e</sup>) avec des questions sur le sens, la grammaire et le vocabulaire.</p>

<h2>Lire stratégiquement</h2>
<ol>
  <li><strong>Premier survol</strong> : lis le texte une fois en entier sans t'arrêter pour saisir le sens global.</li>

<h2>Identifier le type de question</h2>

<h3>Questions de compréhension</h3>
<p>« Que se passe-t-il ? », « Pourquoi le personnage agit-il ainsi ? ». Réponds en <strong>citant le texte</strong> entre guillemets, avec le numéro de ligne.</p>

<h2>Le point de vue narratif</h2>
<ul>
  <li><strong>Point de vue interne</strong> : on voit à travers les yeux d'un personnage. On accède à ses pensées.</li>
  <li><strong>Point de vue externe</strong> : un narrateur extérieur qui décrit comme une caméra. Pas d'accès aux pensées.</li>
  <li><strong>Point de vue omniscient</strong> : le narrateur sait tout — passé, futur, pensées de tous les personnages.</li>
</ul>

<h2>Réécriture</h2>
<p>Question typique : « Réécrivez ce passage en remplaçant "il" par "ils" / au passé / etc. » Il faut <strong>recopier intégralement</strong> et faire toutes les modifications nécessaires (accords, terminaisons, temps).</p>

<p>La France est une <strong>démocratie</strong> : le pouvoir vient du peuple, qui l'exerce directement (référendum) ou par l'intermédiaire de ses représentants.</p>

<h2>Démocratie représentative</h2>
<p>Les citoyens élisent des représentants qui prennent les décisions à leur place. Les élections en France :</p>

  <li><strong>Présidentielle</strong> : élit le Président pour 5 ans.</li>

<h2>Démocratie directe</h2>
<p>Les citoyens votent directement sur une question via un <strong>référendum</strong>. Le Président peut en organiser un.</p>

<h2>Le droit de vote</h2>
<ul>

  <li>Secret : on vote dans un isoloir, sans pression.</li>
  <li>Égal : une voix = une voix.</li>

<ul>

<p>L'énergie est partout : dans la nourriture, l'essence, l'électricité, le mouvement. Elle peut prendre différentes formes et se transformer.</p>

<h2>Les formes d'énergie</h2>
<ul>
  <li><strong>Énergie cinétique</strong> : énergie du mouvement.</li>
  <li><strong>Énergie potentielle</strong> : énergie liée à la position (un objet en hauteur).</li>
  <li><strong>Énergie thermique</strong> : liée à la chaleur.</li>
  <li><strong>Énergie électrique</strong>.</li>
  <li><strong>Énergie chimique</strong> : dans les piles, les aliments, les carburants.</li>
  <li><strong>Énergie lumineuse</strong>.</li>
  <li><strong>Énergie nucléaire</strong>.</li>
</ul>

<h2>Conversion et conservation</h2>
<p>L'énergie peut <strong>se transformer</strong> d'une forme à une autre, mais elle <strong>ne se crée pas et ne disparaît pas</strong>. Une partie est souvent perdue sous forme de chaleur (pertes).</p>

<div class="example">
<p>Une centrale hydraulique : énergie potentielle de l'eau (en hauteur) → énergie cinétique (chute) → énergie mécanique (turbine) → énergie électrique (générateur).</p>
</div>

<h2>Sources d'énergie</h2>

<h3>Renouvelables</h3>
<p>Elles se reconstituent à l'échelle humaine : solaire, éolien, hydraulique, géothermie, biomasse.</p>

<h3>Non renouvelables</h3>
<p>Réserves limitées : pétrole, gaz, charbon (énergies fossiles), uranium (nucléaire).</p>

<h2>Notions d'électricité</h2>

<h3>Grandeurs et unités</h3>
<ul>
  <li><strong>Tension électrique</strong> : symbole <code>U</code>, unité le <strong>volt (V)</strong>.</li>
  <li><strong>Intensité</strong> : symbole <code>I</code>, unité l'<strong>ampère (A)</strong>.</li>
  <li><strong>Résistance</strong> : symbole <code>R</code>, unité l'<strong>ohm (Ω)</strong>.</li>
  <li><strong>Puissance</strong> : symbole <code>P</code>, unité le <strong>watt (W)</strong>.</li>
  <li><strong>Énergie</strong> : unité le <strong>joule (J)</strong> ou le <strong>kilowattheure (kWh)</strong>.</li>
</ul>

<h3>Loi d'Ohm</h3>
<div class="formula">U = R × I</div>
<p>Lien entre tension, résistance et intensité pour un dipôle ohmique.</p>

<h3>Puissance électrique</h3>
<div class="formula">P = U × I</div>
<p>La puissance s'exprime en watts. Une ampoule de 60 W consomme moins qu'une ampoule de 100 W.</p>

<h3>Énergie consommée</h3>
<div class="formula">E = P × t</div>
<p>Avec P en watts et t en secondes, E en joules. Plus pratique : P en kW et t en heures donnent E en kWh.</p>

<div class="example">
<p>Un radiateur de 2 kW utilisé 5 heures consomme : E = 2 × 5 = 10 kWh.</p>
</div>

<div class="tip">Les appareils domestiques affichent souvent leur puissance (W) et leur consommation annuelle (kWh). Connaître ces deux grandeurs permet d'estimer sa facture d'électricité.</div>

<p>Un objet est en mouvement par rapport à un <strong>référentiel</strong>. Une personne assise dans un train est immobile par rapport au wagon, mais en mouvement par rapport au sol.</p>

<div class="formula">v = d / t</div>

<h2>Atome et molécule</h2>
<p>Un <strong>atome</strong> est la plus petite particule qui conserve les propriétés d'un élément chimique. Une <strong>molécule</strong> est un assemblage de plusieurs atomes.</p>

<div class="example">
<p>L'eau (H₂O) est une molécule formée de 2 atomes d'hydrogène (H) et 1 atome d'oxygène (O). Le dioxygène (O₂) est formé de 2 atomes d'oxygène.</p>

<ul>
  <li><strong>Solide</strong> : forme propre, atomes/molécules serrés.</li>
  <li><strong>Liquide</strong> : forme du récipient, molécules en mouvement.</li>
  <li><strong>Gazeux</strong> : occupe tout l'espace disponible, molécules très éloignées.</li>

<h2>Vocabulaire</h2>
<ul>
  <li><strong>Réactifs</strong> : les espèces chimiques de départ.</li>

  <li><strong>Équation de réaction</strong> : écriture symbolique avec une flèche.</li>

<div class="formula">Réactifs → Produits</div>

<div class="example">
<p>Combustion du méthane :</p>
<p><code>CH₄ + 2 O₂ → CO₂ + 2 H₂O</code></p>

<h2>Les combustions</h2>
<p>Une <strong>combustion</strong> est une réaction entre un combustible (bois, gaz, essence) et un comburant (en général le <strong>dioxygène O₂</strong>). Elle libère de l'énergie sous forme de chaleur et souvent de lumière.</p>

<h3>Combustion complète et incomplète</h3>
<ul>
  <li><strong>Complète</strong> : assez de dioxygène. Produits : CO₂ et H₂O. Flamme bleue, propre.</li>
  <li><strong>Incomplète</strong> : manque de dioxygène. Produits dangereux : <strong>monoxyde de carbone CO</strong> (toxique) et particules (suie). Flamme jaune.</li>
</ul>

<div class="tip">Le monoxyde de carbone (CO) est un gaz <strong>incolore, inodore et mortel</strong>. Il est responsable de nombreuses intoxications dues à des chaudières mal entretenues. La détection passe par des détecteurs spécifiques.</div>

  <li>Du <strong>dihydrogène H₂</strong> (gaz).</li>
</ul>

<div class="example">

<p><code>2 HCl + Fe → FeCl₂ + H₂</code></p>
</div>

<h2>Solutions ioniques</h2>
<p>Quand un sel se dissout dans l'eau, il se sépare en <strong>ions</strong>. L'eau salée, l'eau du robinet, le sang sont des solutions ioniques. Elles conduisent l'électricité, contrairement à l'eau pure.</p>

<div class="example">

<p>La Terre est une planète <strong>active</strong> : la surface bouge sans cesse, des séismes la secouent, des volcans entrent en éruption. Ces phénomènes peuvent menacer les populations.</p>

<h2>La structure interne de la Terre</h2>
<ul>
  <li><strong>Croûte</strong> : couche solide en surface (0-100 km d'épaisseur).</li>

<h2>La tectonique des plaques</h2>
<p>La croûte terrestre est divisée en <strong>plaques</strong> qui se déplacent de quelques cm par an. C'est la <strong>tectonique des plaques</strong>. Aux frontières des plaques se produisent les séismes et le volcanisme.</p>

<h3>Trois types de frontières</h3>
<ul>
  <li><strong>Divergente</strong> : les plaques s'éloignent. Création de croûte nouvelle (dorsales océaniques).</li>
  <li><strong>Convergente</strong> : les plaques entrent en collision. Formation de chaînes de montagnes, ou plongée d'une plaque sous l'autre (subduction).</li>
  <li><strong>Coulissante</strong> : les plaques glissent latéralement (faille de San Andreas en Californie).</li>
</ul>

<h2>Les séismes</h2>
<p>Un <strong>séisme</strong> est causé par la libération soudaine d'énergie le long d'une faille. La cassure se propage en <strong>ondes sismiques</strong> qui font trembler le sol.</p>

<h3>Vocabulaire</h3>

  <li><strong>Magnitude</strong> : intensité du séisme (échelle de Richter ouverte).</li>
</ul>

<h2>Le volcanisme</h2>
<p>Un <strong>volcan</strong> est un point de la surface où remonte du <strong>magma</strong> (roches en fusion) venu du manteau. Quand il sort, on parle de <strong>lave</strong>.</p>

<p>Quand on analyse un objet technique (un sèche-cheveux, une trottinette électrique, un robot…), on peut le décomposer selon deux <strong>chaînes</strong> qui interagissent : la chaîne d'énergie et la chaîne d'information.</p>

<h2>La chaîne d'énergie</h2>
<p>Décrit comment l'<strong>énergie</strong> circule dans l'objet, depuis sa source jusqu'à son utilisation finale.</p>

<div class="formula">Alimenter → Distribuer → Convertir → Transmettre → Agir</div>

<ul>
  <li><strong>Alimenter</strong> : prise électrique, batterie, panneau solaire.</li>
  <li><strong>Distribuer</strong> : interrupteur, fil électrique, relais.</li>
  <li><strong>Convertir</strong> : moteur (énergie électrique → mécanique), ampoule (électrique → lumineuse), résistance chauffante (électrique → thermique).</li>
  <li><strong>Transmettre</strong> : engrenages, courroies, axes.</li>
  <li><strong>Agir</strong> : action finale (faire avancer, chauffer, éclairer).</li>
</ul>

<div class="example">
<p>Trottinette électrique : <em>batterie → câble → moteur → roue → mouvement</em>.</p>
</div>

<h2>La chaîne d'information</h2>
<p>Décrit comment l'<strong>information</strong> circule pour <strong>commander</strong> et <strong>contrôler</strong> la chaîne d'énergie.</p>

<div class="formula">Acquérir → Traiter → Communiquer</div>

<ul>
  <li><strong>Acquérir</strong> : <strong>capteurs</strong> qui mesurent (température, lumière, distance, vitesse…).</li>
  <li><strong>Traiter</strong> : un <strong>microcontrôleur</strong> ou processeur prend des décisions selon un programme.</li>
  <li><strong>Communiquer</strong> : envoie des ordres à la chaîne d'énergie, affiche des informations à l'utilisateur.</li>
</ul>

<h2>Capteurs et actionneurs</h2>

<h3>Capteurs (chaîne d'info)</h3>
<p>Mesurent une grandeur physique et la transforment en signal électrique :</p>
<ul>
  <li>Capteur de température (thermistance).</li>
  <li>Capteur de lumière (photorésistance).</li>
  <li>Capteur de mouvement (PIR), de présence.</li>
  <li>Capteur de distance (ultrasons, infrarouge).</li>
</ul>

<h3>Actionneurs (chaîne d'énergie)</h3>
<p>Réalisent une action en consommant de l'énergie :</p>
<ul>
  <li>Moteur.</li>
  <li>Ampoule, LED.</li>
  <li>Haut-parleur.</li>
  <li>Résistance chauffante.</li>
</ul>

<h2>Comment les chaînes interagissent</h2>

<div class="example">
<p>Lampe à détecteur de mouvement :</p>
<ul>
  <li>Chaîne d'info : le détecteur (capteur) repère un mouvement, le programme décide d'allumer, l'ordre est envoyé.</li>
  <li>Chaîne d'énergie : l'alimentation électrique passe par l'interrupteur, traverse la résistance, et l'ampoule s'allume.</li>

<p>Pour concevoir un objet, les techniciens utilisent des outils numériques : la <strong>CAO</strong> (Conception Assistée par Ordinateur) permet de modéliser un objet en 3D, puis de le <strong>prototyper</strong> avant de le produire en série.</p>

<h2>La démarche de projet</h2>
<p>Du besoin à l'objet, le chemin classique :</p>
<ol>
  <li><strong>Identifier le besoin</strong> et les contraintes (cahier des charges).</li>
  <li><strong>Imaginer</strong> des solutions (croquis, recherches).</li>
  <li><strong>Modéliser</strong> sur ordinateur (CAO).</li>
  <li><strong>Prototyper</strong> : créer un premier exemplaire pour tester.</li>
  <li><strong>Tester</strong>, ajuster.</li>
  <li><strong>Produire</strong>, distribuer.</li>
</ol>

<h2>La CAO (Conception Assistée par Ordinateur)</h2>
<p>Avec un logiciel de CAO (Solidworks, Onshape, FreeCAD, Tinkercad au collège), on dessine un objet en 3D. Avantages :</p>
<ul>
  <li>Visualiser sous tous les angles.</li>
  <li>Modifier facilement.</li>
  <li>Vérifier les dimensions, les assemblages.</li>
  <li>Simuler le fonctionnement avant la fabrication.</li>
</ul>

<h2>Le cahier des charges</h2>
<p>Document qui décrit ce que doit faire l'objet :</p>
<ul>
  <li><strong>Fonctions principales</strong> : à quoi il doit servir.</li>
  <li><strong>Fonctions contraintes</strong> : prix, taille, poids, écologie, ergonomie, normes…</li>
</ul>

<div class="example">
<p>Cahier des charges d'une lampe de bureau :</p>
<ul>
  <li>Fonction principale : éclairer une zone de travail.</li>
  <li>Contraintes : pesant moins de 1 kg, alimentation 230 V, prix < 25 €, design moderne, durée de vie > 5 ans.</li>
</ul>
</div>

<h2>Le prototypage</h2>
<p>Un <strong>prototype</strong> est un premier exemplaire de l'objet, construit pour tester les choix de conception. Il peut être :</p>
<ul>
  <li>En carton (maquette rapide).</li>
  <li>Imprimé en 3D.</li>
  <li>Usiné dans un atelier.</li>
</ul>

<h2>L'impression 3D</h2>
<p>L'<strong>impression 3D</strong> (fabrication additive) consiste à <strong>déposer de la matière couche par couche</strong> pour former un objet. Idéale pour le prototypage rapide.</p>

<h3>Comment ça marche</h3>
<ol>
  <li>Modélisation 3D sur ordinateur.</li>
  <li>Conversion en fichier <strong>STL</strong>.</li>
  <li>Découpe en couches fines (logiciel de slicing → fichier G-code).</li>
  <li>L'imprimante 3D suit les instructions et fait fondre le filament (plastique PLA, ABS…) couche par couche.</li>
</ol>

<h3>Avantages</h3>
<ul>
  <li>Rapide pour des petites pièces.</li>
  <li>Formes complexes possibles.</li>
  <li>Pas de moule à créer.</li>
</ul>

<h3>Limites</h3>
<ul>
  <li>Lent pour des grandes pièces.</li>
  <li>Coût élevé en grande série (l'industrie préfère le moulage par injection).</li>
  <li>Résistance mécanique limitée.</li>
</ul>

<h2>La fabrication soustractive</h2>
<p>À l'inverse de l'impression 3D (additive), la fabrication soustractive consiste à <strong>enlever de la matière</strong> à partir d'un bloc :</p>
<ul>
  <li><strong>Fraisage</strong> : avec une fraiseuse.</li>
  <li><strong>Découpe laser</strong> : pour les plaques.</li>
  <li><strong>Découpe à eau</strong>.</li>
</ul>

<div class="tip">L'impression 3D ne remplacera pas la production de masse, mais elle révolutionne le prototypage et la <strong>personnalisation</strong> (prothèses sur mesure, pièces de rechange spécifiques). Elle se développe aussi pour la construction (maisons imprimées) et la médecine.</div>
